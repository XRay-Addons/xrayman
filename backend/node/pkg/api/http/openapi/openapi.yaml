openapi: 3.0.3
info:
  title: XRay node API
  version: 1.0.0

paths:
  /start:
    post:
      summary: Start node with user list
      operationId: Start
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRequest"
      responses:
        "200":
          description: Successful start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResponse"
        "default":
          description: General Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stop:
    post:
      summary: Stop node
      operationId: Stop
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "default":
          description: General Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /status:
    get:
      summary: Get current service status
      operationId: GetStatus
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "default":
          description: General Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/edit:
    post:
      operationId: EditUsers
      summary: Edit node users list
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditUsersRequest"

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "default":
          description: General Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    UserID:
      type: integer

    User:
      type: object
      required:
        - ID
        - name
        - vlessUUID
      properties:
        ID:
          $ref: "#/components/schemas/UserID"
        name:
          type: string
        vlessUUID:
          type: string

    ClientConfigTemplateItem:
      description: "client config json template, no type for raw json"

    ClientConfigTemplate:
      type: object
      required:
        - template
        - vlessEmailField
        - vlessUUIDField
      properties:
        template:
          type: array
          items:
            $ref: "#/components/schemas/ClientConfigTemplateItem"

        vlessEmailField:
          type: string
        vlessUUIDField:
          type: string

    ServiceStatus:
      type: string
      description: Status of the service
      enum: ["unknown", "stopped", "running"]

    StartRequest:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"

    StartResponse:
      type: object
      required:
        - clientConfigTemplate
      properties:
        clientConfigTemplate:
          $ref: "#/components/schemas/ClientConfigTemplate"

    StatusResponse:
      type: object
      required:
        - serviceStatus
      properties:
        serviceStatus:
          $ref: "#/components/schemas/ServiceStatus"

    EditUsersRequest:
      type: object
      required:
        - add
        - remove
      properties:
        add:
          type: array
          items:
            $ref: "#/components/schemas/User"
        remove:
          type: array
          items:
            $ref: "#/components/schemas/User"

    EmptyResponse:
      type: object
      description: Empty response body
      properties: {}
      additionalProperties: false

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        details:
          type: string
          nullable: true

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
