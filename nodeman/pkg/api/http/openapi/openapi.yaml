openapi: 3.0.3
info:
  title: Node Management API
  version: 1.0.0

paths:
  /nodes/new:
    post:
      summary: Create a new node
      operationId: NewNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewNodeRequest'
      responses:
        '200':
          description: Created node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewNodeResponse'
        'default':
          description: General Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes/start:
    post:
      summary: Start a node
      operationId: StartNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartNodeRequest'
      responses:
        '200':
          description: Start result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartNodeResponse'
        'default':
          description: General Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes/stop:
    post:
      summary: Stop a node
      operationId: StopNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopNodeRequest'
      responses:
        '200':
          description: Stop result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopNodeResponse'
        'default':
          description: General Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes:
    get:
      summary: List all nodes
      operationId: ListNodes
      parameters: []
      responses:
        '200':
          description: List of nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNodeResponse'
        'default':
          description: General Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    NodeID:
      type: integer
      format: int32

    NodeStatus:
      type: string
      enum: [unknown, stopped, running]

    ClientConfig:
      type: object
      properties:
        Template:
          type: string
        UserNameField:
          type: string
        VlessUUIDField:
          type: string
      required:
        - Template
        - UserNameField
        - VlessUUIDField

    NodeConnectionInfo:
      type: object
      properties:
        Endpoint:
          type: string
        AccessSecret:
          type: string
          format: byte
      required:
        - Endpoint
        - AccessSecret

    NodeConfig:
      type: object
      properties:
        ClientConfig:
          $ref: '#/components/schemas/ClientConfig'
        ConnectionInfo:
          $ref: '#/components/schemas/NodeConnectionInfo'
      required:
        - ClientConfig
        - ConnectionInfo

    Node:
      type: object
      properties:
        ID:
          $ref: '#/components/schemas/NodeID'
        Config:
          $ref: '#/components/schemas/NodeConfig'
        CurrentStatus:
          $ref: '#/components/schemas/NodeStatus'
        TargetStatus:
          $ref: '#/components/schemas/NodeStatus'
      required:
        - ID
        - Config
        - CurrentStatus
        - TargetStatus

    NewNodeRequest:
      type: object
      properties:
        Endpoint:
          type: string
      required:
        - Endpoint

    NewNodeResponse:
      type: object
      properties:
        ID:
          $ref: '#/components/schemas/NodeID'
        Endpoint:
          type: string
        AccessSecret:
          type: string
          format: byte
      required:
        - ID
        - Endpoint
        - AccessSecret

    StartNodeRequest:
      type: object
      properties:
        ID:
          $ref: '#/components/schemas/NodeID'
      required:
        - ID

    StartNodeResponse:
      type: object
      properties: {}

    StopNodeRequest:
      type: object
      properties:
        ID:
          $ref: '#/components/schemas/NodeID'
      required:
        - ID

    StopNodeResponse:
      type: object
      properties: {}

    ListNodeRequest:
      type: object
      properties: {}

    ListNodeResponse:
      type: object
      properties:
        Nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
      required:
        - Nodes

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        details:
          type: string
          nullable: true